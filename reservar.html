<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reservar vehículo</title>
    <link rel="stylesheet" href="./Css/estilos.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="./Img/logo.svg">
            <h2>Luxury-Rent</h2>
        </div>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="autos.html">Autos</a>
            <a href="reservar.html">Reservar</a>
            <a href="reservas.html">Reservas</a>
            <a href="login.html">Admin</a>
        </nav>
    </header>

    <section class="form-container">

        <h2>Reservar vehículo</h2>

        <form id="formReserva">

            <input type="text" id="nombre" placeholder="Nombre del cliente" required>

            <select id="auto"></select>
            <div id="previewAuto" style="text-align:center; margin-top:10px;"></div>

            <br>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1; text-align: left;">
                    <label for="fechaInicio" style="font-size: 0.9em; color: #555;">Fecha inicio:</label>
                    <input type="date" id="fechaInicio" required>
                </div>
                <div style="flex: 1; text-align: left;">
                    <label for="fechaFin" style="font-size: 0.9em; color: #555;">Fecha fin:</label>
                    <input type="date" id="fechaFin" required>
                </div>
            </div>

            <div id="precioReserva">Total a pagar : $0</div>


            <br>

            <h3>Método de pago</h3>

            <input type="text" id="numeroTarjeta" placeholder="Número de tarjeta" required>

            <div id="tipoTarjeta"></div>

            <input type="text" id="fechaTarjeta" placeholder="MM/AA" required>


            <div class="cvv-container">

                <input type="password" id="cvv" placeholder="CVV" maxlength="3" required>



            </div>

            <button class="btn">Reservar</button>

        </form>

        <div id="recibo"></div>

    </section>

    <footer>
        <p>© 2026 Luxury-Rent</p>
    </footer>

    <script src="./Js/autosData.js"></script>
    <script src="./Js/script.js"></script>

</body>

</html>
